    filtering is already done.
  threshold: 1383
  distribution_basis: p05
- step: max_genes
  status: already_done
  rationale: Section 2 states maximum genes per cell (4575) is within the 99th percentile,
    therefore filtering is already done.
  threshold: 4575
  distribution_basis: p99
- step: max_pct_mito
  status: pending
  rationale: Section 2 states the max mito fraction (0.0478) exceeds the p99-based
    threshold (0.026), requiring filtering.
  threshold: 0.026
  distribution_basis: p99
doublet_detection:
  method_recommendation: scDblFinder
  status: pending
  rationale: Section 2 recommends scDblFinder for doublet detection.
